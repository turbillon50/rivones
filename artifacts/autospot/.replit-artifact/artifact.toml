kind = "web"
previewPath = "/"
title = "AutoSpot"
version = "1.0.0"
id = "artifacts/autospot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26188

[services.development]
run = "pnpm --filter @workspace/autospot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autospot", "run", "build" ]
publicDir = "artifacts/autospot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26188"
BASE_PATH = "/"
